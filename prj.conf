CONFIG_GPIO=y
CONFIG_DMA=y
CONFIG_COUNTER=y
CONFIG_EVENTS=y

CONFIG_SPEED_OPTIMIZATIONS=y

CONFIG_STDOUT_CONSOLE=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_BOS=y
CONFIG_USB_COMPOSITE_DEVICE=y
CONFIG_USB_CDC_ACM=y
# Composite (vendor + CDC) needs more concurrent transfers than the defaults.
CONFIG_USB_MAX_NUM_TRANSFERS=8
CONFIG_USB_NUMOF_EP_WRITE_RETRIES=10
CONFIG_SERIAL=y
CONFIG_USB_DEVICE_PRODUCT="GBLink USB"
CONFIG_USB_DEVICE_PID=0x000A
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_RING_BUFFER=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n

CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_NANO=y
CONFIG_REQUIRES_FULL_LIBCPP=y

CONFIG_TICKLESS_KERNEL=y

CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_NAME=y
CONFIG_DEBUG_THREAD_INFO=y
CONFIG_ASSERT=y

CONFIG_PINCTRL=y

# Flash storage for persistent settings (the WebUSB landing-page toggle).
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

CONFIG_SECTIONS_USE_MASTER_MODE=y
CONFIG_REBOOT=y
# Driving SD low is opt-in (off by default). For rare compatibility issues with some GBAs.
CONFIG_GB_LINK_DRIVE_SD_LOW=n