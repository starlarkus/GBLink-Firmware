name: Build Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ZEPHYR_SDK_VERSION: 0.16.8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: gblink-firmware

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install west
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ccache ninja-build gperf

      - name: Initialize west workspace
        run: |
          west init -l gblink-firmware
          west update
          west zephyr-export

      - name: Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${ZEPHYR_SDK_VERSION}/zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz
          cd zephyr-sdk-${ZEPHYR_SDK_VERSION}
          ./setup.sh -t arm-zephyr-eabi -c

      - name: Install Zephyr Python dependencies
        run: pip install -r zephyr/scripts/requirements.txt

      - name: Build firmware
        run: west build -b rpi_pico gblink-firmware -- -DEXTRA_KCONFIG_TARGETS=none
        env:
          KCONFIG_WARN_TO_ERROR: 0

      - name: Rename firmware
        run: cp build/zephyr/zephyr.uf2 gblink.uf2

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: gblink-firmware
          path: gblink.uf2

      - name: Attach to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: gblink.uf2
